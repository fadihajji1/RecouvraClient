<header class="navbar">
  <div class="navbar-left">
    <h2 class="page-title">{{ getPageTitle() }}</h2>
  </div>
  <div class="navbar-right">
    <button
      type="button"
      class="theme-toggle-btn"
      (click)="toggleTheme()"
      [attr.aria-label]="getThemeButtonLabel()"
      [attr.title]="getThemeButtonLabel()"
    >
      <span class="theme-toggle-icon">{{ getThemeButtonIcon() }}</span>
    </button>
    <span class="role-badge" [class]="'badge badge-' + (authService.getRole() || 'admin')">
      {{ authService.getRole() }}
    </span>
  </div>
</header>
