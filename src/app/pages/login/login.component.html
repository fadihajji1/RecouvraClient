<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="brand-icon">R+</div>
      <h1>Recouvra<span class="accent">+</span></h1>
      <p>Connectez-vous à votre compte</p>
    </div>

    @if (error) {
      <div class="alert alert-error">{{ error }}</div>
    }

    <form (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" class="form-control" [(ngModel)]="email" name="email"
               placeholder="votre@email.com" required>
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input id="password" type="password" class="form-control" [(ngModel)]="password" name="password"
               placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn-primary btn-block" [disabled]="loading">
        {{ loading ? 'Connexion...' : 'Se connecter' }}
      </button>
    </form>

    <p class="auth-footer">
      Pas encore de compte ? <a routerLink="/register">S'inscrire</a>
    </p>
  </div>
</div>
